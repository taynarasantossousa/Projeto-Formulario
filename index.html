<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela Login</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <img src="./assets/img/img.svg" alt="imagem">
    <div class="container">
        <div class="Login">
            <header>
                <h2>Bem-vindo!</h2>
                <h1>Faça seu login</h1>
                <p>Utilize as credenciais fornecidas pelo administrador</p>
            </header>
    
            <div class="e-mail">
                <form action="E-mail">
                    <label for="E-mail">E-mail</label>
                    <input type="email" placeholder="Entre com seu E-mail">
                </form>
            </div>
    
            <div class="Senha">
                <form action="Senha">
                    <label for="Senha">Senha</label>
                    <input type="senha" placeholder="Entre com sua Senha">
                    <img src="./assets/img/icone.svg" alt="icone de senha" >
                </form>
            </div>
            <div class="Opcoes"> 
                <label><input type="checkbox">Lembrar-me</label>
                <a href="#">Esqueceu a senha?</a>
            </div>
            <div class="btn">
                <button type="submit">Entrar</button>
            </div>
        </div>
    </div>
</body>
</html>
